name: Build and release

on:
  push:
    tags:
      - 'V*'
  workflow_dispatch:
    inputs:
      source_ref:
        description: 'Branche ou tag à construire'
        required: false
        default: 'main'
      release_tag:
        description: 'Tag de release à mettre à jour (ex: V2.3)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.source_ref || github.ref }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Run tests
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\test.ps1

      - name: Build app
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\build.ps1 -Clean

      - name: Prepare zip
        id: package
        shell: pwsh
        run: |
          $releaseTag = '${{ github.ref_name }}'
          if ('${{ github.event_name }}' -eq 'workflow_dispatch' -and -not [string]::IsNullOrWhiteSpace('${{ github.event.inputs.release_tag }}')) {
            $releaseTag = '${{ github.event.inputs.release_tag }}'
          }
          if ([string]::IsNullOrWhiteSpace($releaseTag)) {
            $releaseTag = 'manual-build'
          }
          $zipName = "ShadowDL_${releaseTag}_windows_x64.zip"
          $zipPath = Join-Path (Resolve-Path .\dist).Path $zipName
          if (Test-Path -LiteralPath $zipPath) {
            Remove-Item -LiteralPath $zipPath -Force
          }
          Compress-Archive -Path .\dist\ShadowDL -DestinationPath $zipPath -CompressionLevel Optimal
          "zip_name=$zipName" >> $env:GITHUB_OUTPUT
          "zip_path=$zipPath" >> $env:GITHUB_OUTPUT

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.zip_name }}
          path: ${{ steps.package.outputs.zip_path }}
          if-no-files-found: error

      - name: Publish release asset
        if: startsWith(github.ref, 'refs/tags/V') || github.event.inputs.release_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag || github.ref_name }}
          files: ${{ steps.package.outputs.zip_path }}
          overwrite_files: true
